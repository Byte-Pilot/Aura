services:
  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - ./logs/nginx:/var/log/nginx
      - /etc/letsencrypt:/etc/letsencrypt:ro
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "5"
    depends_on:
      - backend

  backend:
    image: ${DOCKER_USER}/aura-backend:latest
    restart: always
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "5"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "5"
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "api", "-d", "aura" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
